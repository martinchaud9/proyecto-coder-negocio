{% extends "productos/inicio.html" %}

{% block contenido %}
<div class="alert alert-danger shadow-sm">
    <h2>¿Eliminar posteo?</h2>
    <p>¿Estás seguro de que quieres borrar <strong>"{{ object.titulo }}"</strong>? Esta acción no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'post_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
