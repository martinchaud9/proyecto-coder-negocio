{% extends "productos/inicio.html" %}

{% block contenido %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="text-center mb-4 fw-bold text-primary">Crear cuenta</h3>

          <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            
            {% for field in form %}
              <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                
                <input type="{% if 'password' in field.name %}password{% elif 'email' in field.name %}email{% else %}text{% endif %}" 
                       name="{{ field.html_name }}" 
                       class="form-control" 
                       id="{{ field.auto_id }}"
                       {% if field.value %}value="{{ field.value }}"{% endif %}
                       required>
                
                {% if field.errors %}
                  <div class="text-danger small">{{ field.errors|striptags }}</div>
                {% endif %}
              </div>
            {% endfor %}

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary fw-semibold">Registrarme</button>
            </div>
          </form>

          <div class="text-center mt-3">
            <small class="text-muted">¿Ya tenés cuenta? 
              <a href="{% url 'login' %}" class="text-decoration-none text-primary fw-semibold">Iniciá sesión</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
